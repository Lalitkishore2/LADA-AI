[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "I"]

[tool.pytest.ini_options]
testpaths = ["tests", "skills"]
python_files = ["test_*.py"]
pythonpath = ["."]

[tool.pyright]
include = ["modules", "tests", "skills", "."]
extraPaths = ["."]
