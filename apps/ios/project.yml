name: LADA
options:
  bundleIdPrefix: ai.lada
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  LADAKit:
    path: ../shared/LADAKit
  Swabble:
    path: ../../Swabble

schemes:
  LADA:
    shared: true
    build:
      targets:
        LADA: all
    test:
      targets:
        - LADATests
        - LADALogicTests
  LADALogicTests:
    shared: true
    build:
      targets:
        LADALogicTests: all
    test:
      targets:
        - LADALogicTests

targets:
  LADA:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: LADAShareExtension
        embed: true
      - target: LADAActivityWidget
        embed: true
      - target: LADAWatchApp
      - package: LADAKit
      - package: LADAKit
        product: LADAChatUI
      - package: LADAKit
        product: LADAProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/LADA.entitlements
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LADA_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LADA_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          LADA_PUSH_TRANSPORT: direct
          LADA_PUSH_DISTRIBUTION: local
          LADA_PUSH_RELAY_BASE_URL: ""
          LADA_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          LADA_PUSH_TRANSPORT: direct
          LADA_PUSH_DISTRIBUTION: local
          LADA_PUSH_RELAY_BASE_URL: ""
          LADA_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: LADA
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.lada.ios
            CFBundleURLSchemes:
              - lada
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.lada.ios.bgrefresh
        NSLocalNetworkUsageDescription: LADA discovers and connects to your LADA gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _lada-gw._tcp
        NSCameraUsageDescription: LADA can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: LADA uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: LADA can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: LADA needs microphone access for voice wake.
        NSMotionUsageDescription: LADA may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: LADA needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: LADA uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        LADAPushTransport: "$(LADA_PUSH_TRANSPORT)"
        LADAPushDistribution: "$(LADA_PUSH_DISTRIBUTION)"
        LADAPushRelayBaseURL: "$(LADA_PUSH_RELAY_BASE_URL)"
        LADAPushAPNsEnvironment: "$(LADA_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  LADAShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: LADAKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(LADA_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LADA_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: LADA Share
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  LADAActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/LADAActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LADA_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: LADA Activity
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  LADAWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: LADAWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(LADA_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(LADA_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(LADA_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LADA_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: LADA
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(LADA_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  LADAWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(LADA_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(LADA_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(LADA_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(LADA_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: LADA
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(LADA_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  LADATests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: LADA
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.lada.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LADA.app/LADA"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: LADATests
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"

  LADALogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: LADAKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(LADA_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(LADA_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.lada.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: LADALogicTests
        CFBundleShortVersionString: "$(LADA_MARKETING_VERSION)"
        CFBundleVersion: "$(LADA_BUILD_VERSION)"

